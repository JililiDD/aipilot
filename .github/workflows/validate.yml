name: Validate plugin release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate plugin layout
        run: node scripts/validate-plugin-layout.js

      - name: Run tests
        run: node --test tests/plugin-layout.test.js

      - name: Run release preflight
        run: node scripts/release-check.js

      - name: Check whitespace errors
        run: git diff --check HEAD^
